<!doctype html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>კალათა - GreenFood</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    
    body { 
      background-color: #0b0f0c; 
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    
    .navbar-custom { 
      background-color: #121813 !important; 
      border-bottom: 2px solid #198754;
    }

    .navbar-brand {
      color: #198754 !important;
      font-weight: bold;
      letter-spacing: 1px;
    }

    
    .cart-card {
      background: #121813;
      padding: 2rem;
      border-radius: 15px;
      border: 1px solid #2d382e;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .table {
      color: #e0e0e0 !important;
      border-color: #2d382e;
    }

    .table thead {
      border-bottom: 2px solid #198754;
    }

   
    img.img-thumbnail { 
      width: 60px; 
      height: 60px;
      object-fit: cover;
      border-radius: 10px !important;
      border: 1px solid #198754;
      background-color: #2d382e;
    }

   
    .btn-plus-minus {
      border: 1px solid #198754 !important;
      color: #198754 !important;
      background: transparent;
      width: 30px;
      height: 30px;
      padding: 0;
      line-height: 1;
    }

    .btn-plus-minus:hover:not(:disabled) {
      background: #198754;
      color: white !important;
    }

    .btn-plus-minus:disabled {
      border-color: #333 !important;
      color: #555 !important;
    }

    .btn-delete {
      color: #dc3545;
      background: transparent;
      border: none;
      transition: 0.3s;
    }

    .btn-delete:hover {
      color: #ff4d5e;
      transform: scale(1.1);
    }

    #grandTotal {
      color: #198754 !important;
      font-size: 1.5rem;
    }

    .badge-success-custom {
      background-color: #198754;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg mb-3 fixed-top navbar-custom" data-bs-theme="dark">
  <div class="container">
    <a class="navbar-brand" href="MainPage.html">
      <i class="bi bi-lightning-charge-fill me-2"></i>GreenFood
    </a>
    <div class="navbar-nav ms-auto">
      <a class="nav-link active position-relative" href="cart.html">
        <i class="bi bi-cart3 fs-4 text-success"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill badge-success-custom" id="quantity">0</span>
      </a>
    </div>
  </div>
</nav>

<div class="container mt-5 pt-5">
  <div class="cart-card mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="text-success m-0"><i class="bi bi-basket2-fill me-2"></i>თქვენი კალათა</h2>
      <a href="MainPage.html" class="btn btn-outline-success btn-sm">
        <i class="bi bi-arrow-left me-1"></i> მაღაზიაში დაბრუნება
      </a>
    </div>

    <div class="table-responsive">
      <table class="table align-middle" id="cartTable">
        <thead>
          <tr>
            <th class="text-muted">#</th>
            <th>პროდუქტი</th>
            <th>ფასი</th>
            <th>რაოდენობა</th>
            <th class="text-center">წაშლა</th>
          </tr>
        </thead>
        <tbody>
          
        </tbody>
        <tfoot>
          <tr class="fw-bold">
            <td colspan="2" class="text-end text-muted">ჯამი:</td>
            <td colspan="2" id="grandTotal" class="text-success">0 ₾</td>
            <td></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </div>
</div>

<script>
  
  function loadQuantity() {
    return fetch("https://restaurant.stepprojects.ge/api/Baskets/GetAll")
      .then(res => res.json())
      .then(data => {
        var total = data.reduce((s, i) => s + (i.quantity), 0);
        document.getElementById("quantity").textContent = total;
        return data;
      });
  }

  
  function showTotal() {
    let total = 0;
    document.querySelectorAll('#cartTable tbody tr').forEach(row => {
      var txt = row.querySelector('.price-cell span')?.textContent;
      if (txt) {
        var num = parseFloat(txt.replace(" ₾", ""));
        if (!isNaN(num)) total += num;
      }
    });
    document.getElementById("grandTotal").textContent = total.toFixed(2) + " ₾";
  }

  
  function groupApiItems(items) {
    var grouped = {};
    items.forEach(item => {
      var prod = item.product;
      if (!prod?.id) return;
      var id = prod.id;
      if (!grouped[id]) grouped[id] = { product: prod, quantity: 0 };
      grouped[id].quantity += item.quantity;
    });
    return Object.values(grouped);
  }

  
  function deleteAllForProduct(productId) {
    return fetch(`https://restaurant.stepprojects.ge/api/Baskets/DeleteProduct/${productId}`, {
      method: "DELETE"
    });
  }

  
  function renderCart(groupedProducts) {
    var tbody = document.querySelector("#cartTable tbody");
    tbody.innerHTML = "";

    groupedProducts.forEach((entry, index) => {
      var prod = entry.product;
      var qty = entry.quantity;
      var unitPrice = prod.price;

      var tr = document.createElement("tr");

      tr.innerHTML = `
        <td class="text-muted">${index + 1}</td>
        <td>
          <div class="d-flex align-items-center">
            <img src="${prod.image}" class="img-thumbnail me-3">
            <span class="fw-bold">${prod.name}</span>
          </div>
        </td>
        <td class="fw-bold text-success price-cell">
          <span>${(unitPrice * qty).toFixed(2)} ₾</span>
        </td>
        <td>
          <div class="d-flex align-items-center gap-2">
            <button class="btn btn-plus-minus rounded-circle minus-btn" ${qty <= 1 ? 'disabled' : ''}>-</button>
            <span class="fw-bold px-1">${qty}</span>
            <button class="btn btn-plus-minus rounded-circle plus-btn">+</button>
          </div>
        </td>
        <td class="text-center">
          <button class="btn-delete del-btn">
            <i class="bi bi-trash3 fs-5"></i>
          </button>
        </td>
      `;

      var refresh = () =>
        fetch("https://restaurant.stepprojects.ge/api/Baskets/GetAll")
          .then(r => r.json())
          .then(items => {
            renderCart(groupApiItems(items));
            loadQuantity();
          });

      
      tr.querySelector('.plus-btn').onclick = () =>
        fetch("https://restaurant.stepprojects.ge/api/Baskets/AddToBasket", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ productId: prod.id, quantity: 1, price: unitPrice })
        }).then(refresh);

      
      tr.querySelector('.minus-btn').onclick = () =>
        fetch(`https://restaurant.stepprojects.ge/api/Baskets/DeleteProduct/${prod.id}`, { method: "DELETE" })
          .then(refresh);

      
      tr.querySelector('.del-btn').onclick = () => {
        Swal.fire({
          title: 'ნამდვილად გსურთ წაშლა?',
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#198754',
          cancelButtonColor: '#d33',
          confirmButtonText: 'დიახ',
          cancelButtonText: 'არა',
          background: '#121813',
          color: '#fff'
        }).then((result) => {
          if (result.isConfirmed) {
            deleteAllForProduct(prod.id).then(refresh);
          }
        });
      };

      tbody.appendChild(tr);
    });

    showTotal();
  }

  
  fetch("https://restaurant.stepprojects.ge/api/Baskets/GetAll")
    .then(res => res.json())
    .then(items => {
      renderCart(groupApiItems(items));
      loadQuantity();
    });
</script>

</body>
</html>
